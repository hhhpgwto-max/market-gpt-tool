openapi: 3.1.0
info:
  title: Market GPT Tool
  version: 0.1.0
  description: Query A-share market data for a Custom GPT.
servers:
  - url: https://YOUR-RENDER-URL.onrender.com
security:
  - ApiKeyAuth: []
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
paths:
  /health:
    get:
      operationId: health
      summary: Check whether the market data tool is running.
      responses:
        "200":
          description: Service status.
  /search:
    get:
      operationId: searchStock
      summary: Search A-share stock codes by code or Chinese name.
      parameters:
        - name: keyword
          in: query
          required: true
          schema:
            type: string
          description: Stock code or Chinese stock name keyword, such as 600519 or 茅台.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
            default: 10
      responses:
        "200":
          description: Matching stocks.
  /quote:
    get:
      operationId: getQuote
      summary: Get realtime quote for one A-share stock code.
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
          description: A-share stock code, such as 600519 or 000001.
      responses:
        "200":
          description: Realtime stock quote.
  /kline:
    get:
      operationId: getKline
      summary: Get recent K-line data for one A-share stock code.
      parameters:
        - name: symbol
          in: query
          required: true
          schema:
            type: string
          description: A-share stock code, such as 600519 or 000001.
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [daily, weekly, monthly, 1m, 5m, 15m, 30m, 60m]
            default: daily
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 120
      responses:
        "200":
          description: K-line data.
