services:
  - type: web
    name: market-gpt-tool
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MARKET_TOOL_TOKEN
        sync: false
      - key: MARKET_TOOL_NAME
        value: market-gpt-tool
